[package]
name = "rsurl"
version = "0.0.2"
edition = "2021"
rust-version = "1.74"
authors = ["Karpelès Lab Inc."]
description = "A pure-Rust implementation of curl. Library, C FFI, and CLI for HTTP/HTTPS/FTP/FTPS."
license = "MIT"
repository = "https://github.com/KarpelesLab/rsurl"
readme = "README.md"
keywords = ["http", "https", "curl", "client", "tls"]
categories = ["network-programming", "web-programming::http-client", "command-line-utilities"]

[lib]
name = "rsurl"
crate-type = ["rlib", "cdylib", "staticlib"]

[[bin]]
name = "rsurl"
path = "src/bin/rsurl.rs"

[features]
# Default keeps the historical behaviour: a single TLS backend layered on
# purecrypto, no extra C-free guarantees lost.
default = ["purecrypto-tls"]
# Use purecrypto's TLS stack (purecrypto::tls). No additional deps.
purecrypto-tls = []
# Use rustls 0.23 + ring instead. Enable with
#   --no-default-features --features rustls-tls
# When both `purecrypto-tls` and `rustls-tls` are active, rustls wins (see
# the cfg cascade in src/tls/mod.rs). HTTP/3 always uses purecrypto's TLS
# regardless of this feature, because the QUIC stack is bound to it.
rustls-tls = ["dep:rustls", "dep:rustls-pemfile"]

[dependencies]
# Required regardless of TLS backend: SHA1 + RNG (WebSocket, MQTT), X.509
# parsing for verbose cert display, and the QUIC stack behind HTTP/3.
purecrypto = "0.2"
# rustls-tls backend. `ring` is selected explicitly so cross-platform builds
# don't pull in cmake/nasm (which the default `aws-lc-rs` provider needs on
# Windows). `tls12` is opt-in in rustls 0.23; we want it on for parity with
# the purecrypto backend.
rustls = { version = "0.23", optional = true, default-features = false, features = ["std", "ring", "tls12", "logging"] }
rustls-pemfile = { version = "2", optional = true }
# gzip / zlib / raw-deflate / zstd / brotli / lzw codecs. `compcol` is our own
# pure-Rust compression collection; `std` enables the `io` adapter we use to
# bound decompressed output via `LimitedDecoder`. The `zstd`, `brotli` and
# `lzw` features are pure-Rust (each only pulls in `alloc`, no `*-sys` C crate),
# so we can decode those response encodings without breaking the no-C guarantee.
# `lzw` is the Unix `compress(1)` / `.Z` format. `factory` and `rle` are not
# needed here, so leave default features off and opt in to only what we use.
compcol = { version = "0.4", default-features = false, features = ["std", "gzip", "zlib", "zstd", "brotli", "lzw"] }

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
