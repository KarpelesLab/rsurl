name: Release-plz

# Runs on every push to master plus manual dispatch. release-plz opens a
# "release PR" that bumps versions + CHANGELOG; merging it runs the release
# job, which publishes to crates.io and creates the GitHub Release.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  # Open/update the release PR and create GitHub Releases.
  contents: write
  pull-requests: write

# Don't run two release-plz jobs in parallel.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          # Use the dedicated RELEASE_PLZ_TOKEN (a PAT / GitHub App token), not
          # the default GITHUB_TOKEN. release-plz creates the GitHub Release with
          # whatever this token is; GitHub suppresses downstream workflow
          # triggers for GITHUB_TOKEN-created events (anti-recursion), but a
          # PAT/App token does fire them — so `release: published` reaches
          # release-binaries.yml on its own and no manual dispatch is needed.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          # RELEASE_PLZ_TOKEN (PAT / GitHub App token) rather than GITHUB_TOKEN
          # so the release PR it opens triggers CI (ci.yml). A PR created with
          # the default GITHUB_TOKEN cannot start other workflow runs.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
